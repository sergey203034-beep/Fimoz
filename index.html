<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация — Fimoz</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <main class="shell">
        <section class="card">
            <header class="card__header">
                <h1 class="title">Создать аккаунт</h1>
                <p class="subtitle">Присоединяйся к мессенджеру!</p>
            </header>

            <form id="registerForm" class="form">
                <div class="field">
                    <label class="label">Почта</label>
                    <input class="input" id="email" type="email" placeholder="email@example.com" required />
                </div>
                <div class="field">
                    <label class="label">Имя пользователя (ник)</label>
                    <input class="input" id="username" type="text" placeholder="Твой ник" required />
                </div>
                <div class="field">
                    <label class="label">Пароль</label>
                    <input class="input" id="password" type="password" placeholder="Минимум 6 символов" required />
                </div>

                <button class="primaryBtn" type="submit" id="submitBtn">Зарегистрироваться</button>

                <p class="small">
                    Уже есть аккаунт? <a class="link" href="./login.html">Войти</a>
                </p>
            </form>
        </section>
        <div class="toast" id="toast"></div>
    </main>

    <script src="./app.js"></script>
</body>
</html>
