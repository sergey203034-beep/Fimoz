<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fimoz Мессенджер</title>
    <meta name="color-scheme" content="dark" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="app">
      <aside class="servers" aria-label="Серверы">
        <button class="srvBtn srvBtn--home" type="button" id="homeBtn" title="Главная">FM</button>
        <div class="srvList" id="guildList"></div>
        <div class="srvBottom">
          <button class="srvBtn srvBtn--add" type="button" id="addGuildBtn" title="Добавить сервер">+</button>
        </div>
      </aside>

      <aside class="channels" aria-label="Каналы">
        <div class="chanTop">
          <div class="chanTop__title" id="guildName">Сервер</div>
          <button class="iconBtn" id="guildMenuBtn" type="button" title="Меню">⋯</button>
        </div>
        <div class="mainMenu" aria-label="Навигация">
          <button class="mainMenu__btn" type="button" id="menuFriends">Друзья</button>
          <button class="mainMenu__btn" type="button" id="menuDMs">ЛС</button>
          <button class="mainMenu__btn" type="button" id="menuAddFriend">Добавить</button>
        </div>
        <div class="chanList" id="channelList"></div>
        <div class="userBar">
          <div class="userBar__who">
            <div class="avatar" id="avatar"></div>
            <div class="userMeta">
              <div class="userMeta__name" id="meName">user</div>
              <div class="userMeta__sub" id="meSub">online</div>
            </div>
          </div>
          <div class="userBar__actions">
            <button class="iconBtn" id="settingsBtn" type="button" title="Настройки" aria-label="Настройки">
              <svg class="uiIcon" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M12 8.8a3.2 3.2 0 1 0 0 6.4 3.2 3.2 0 0 0 0-6.4Zm9 3.2c0-.44-.04-.87-.1-1.29l2.03-1.58a.9.9 0 0 0 .21-1.16l-1.92-3.33a.9.9 0 0 0-1.1-.4l-2.4.97a9.2 9.2 0 0 0-2.24-1.29l-.36-2.55A.9.9 0 0 0 14.23 0h-4.46a.9.9 0 0 0-.89.77l-.36 2.55c-.8.32-1.55.75-2.24 1.29l-2.4-.97a.9.9 0 0 0-1.1.4L.86 7.37a.9.9 0 0 0 .21 1.16L3.1 10.1c-.06.42-.1.85-.1 1.29 0 .44.04.87.1 1.29l-2.03 1.58a.9.9 0 0 0-.21 1.16l1.92 3.33a.9.9 0 0 0 1.1.4l2.4-.97c.69.54 1.44.97 2.24 1.29l.36 2.55c.06.44.45.77.89.77h4.46c.44 0 .83-.33.89-.77l.36-2.55c.8-.32 1.55-.75 2.24-1.29l2.4.97a.9.9 0 0 0 1.1-.4l1.92-3.33a.9.9 0 0 0-.21-1.16l-2.03-1.58c.06-.42.1-.85.1-1.29Z"/>
              </svg>
            </button>
            <button class="iconBtn" id="logoutBtn" type="button" title="Выйти" aria-label="Выйти">
              <svg class="uiIcon" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M10 17v-2h4v-6h-4V7l-5 5 5 5Zm1-15h10a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H11v-2h10V4H11V2Z"/>
              </svg>
            </button>
          </div>
        </div>
      </aside>

      <main class="chat" aria-label="Чат">
        <header class="chatTop">
          <div class="chatTop__left">
            <div class="hash">#</div>
            <div>
              <div class="chatTop__name" id="channelName">канал</div>
              <div class="chatTop__topic" id="channelTopic">Прототип: сообщения сохраняются локально</div>
            </div>
          </div>
          <div class="chatTop__right">
            <button class="iconBtn" id="searchBtn" type="button" title="Поиск" aria-label="Поиск">
              <svg class="uiIcon" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M10.5 3a7.5 7.5 0 1 0 4.57 13.45l4.49 4.49a1 1 0 0 0 1.42-1.42l-4.49-4.49A7.5 7.5 0 0 0 10.5 3Zm0 2a5.5 5.5 0 1 1 0 11 5.5 5.5 0 0 1 0-11Z"/>
              </svg>
            </button>
            <button class="iconBtn" id="membersToggle" type="button" title="Участники" aria-label="Участники">
              <svg class="uiIcon" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M16 11a4 4 0 1 0-3.2-6.4A4 4 0 0 0 16 11Zm-8 0a4 4 0 1 0-3.2-6.4A4 4 0 0 0 8 11Zm8 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4Zm-8 0c-.58 0-1.25.07-1.98.2C3.55 13.73 2 14.86 2 17v2h4.2c.62-2.79 4.4-4 7.8-4-.64-.62-3.07-2-6-2Z"/>
              </svg>
            </button>
          </div>
        </header>

        <div class="searchBar searchBar--hidden" id="searchBar" role="search">
          <input class="searchBar__input" id="searchInput" placeholder="Поиск по сообщениям" />
          <button class="ghostBtn" id="searchPrev" type="button">↑</button>
          <button class="ghostBtn" id="searchNext" type="button">↓</button>
          <button class="ghostBtn" id="searchClose" type="button">Закрыть</button>
          <div class="searchBar__meta" id="searchMeta"></div>
        </div>

        <section class="homeView homeView--hidden" id="homeView" aria-label="Друзья">
          <div class="homeTop">
            <div class="homeTabs">
              <button class="homeTab homeTab--active" type="button" id="tabFriends">Друзья</button>
              <button class="homeTab" type="button" id="tabPending">Заявки</button>
              <button class="homeTab" type="button" id="tabAdd">Добавить</button>
              <button class="homeTab" type="button" id="tabDMs">ЛС</button>
            </div>
          </div>
          <div class="homeBody" id="homeBody"></div>
        </section>

        <section class="voicePane voicePane--hidden" id="voicePane" aria-label="Голосовой чат">
          <div class="voicePane__top">
            <div>
              <div class="voicePane__title" id="voiceTitle">Голосовой канал</div>
              <div class="voicePane__sub" id="voiceSub">Подключение...</div>
            </div>
            <div class="voicePane__actions">
              <button class="ghostBtn" id="voiceMute" type="button">Mute</button>
              <button class="ghostBtn" id="voiceDeafen" type="button">Deafen</button>
              <button class="dangerBtn" id="voiceLeave" type="button">Leave</button>
            </div>
          </div>
          <div class="voicePane__list" id="voicePeers"></div>
          <p class="note">Голос работает между вкладками/окнами этого браузера (WebRTC + BroadcastChannel).</p>
        </section>

        <section class="messages" id="messages" aria-label="Сообщения"></section>

        <form class="composer" id="composer">
          <button class="iconBtn composer__plus" id="attachBtn" type="button" title="Вложения">＋</button>
          <button class="iconBtn composer__plus" id="emojiBtn" type="button" title="Смайлики" aria-label="Смайлики">☺</button>
          <button class="iconBtn composer__plus" id="stickerBtn" type="button" title="Стикеры" aria-label="Стикеры">🗂</button>
          <input class="composer__input" id="messageInput" placeholder="Написать сообщение..." autocomplete="off" />
          <button class="primaryBtn composer__send" id="sendBtn" type="submit">Отправить</button>
        </form>
        <input id="filePicker" type="file" class="visuallyHidden" multiple />
        <input id="stickerPicker" type="file" class="visuallyHidden" accept="image/*" />

        <section class="pickPane pickPane--hidden" id="pickPane" aria-label="Эмодзи и стикеры">
          <div class="pickPane__top">
            <div class="pickPane__tabs">
              <button class="pickTab pickTab--active" type="button" id="pickTabEmoji">Смайлики</button>
              <button class="pickTab" type="button" id="pickTabStickers">Стикеры</button>
            </div>
            <button class="ghostBtn" type="button" id="pickClose">Закрыть</button>
          </div>
          <div class="pickPane__body">
            <div class="emojiGrid" id="emojiGrid"></div>
            <div class="stickerPane stickerPane--hidden" id="stickerPane">
              <div class="stickerPane__actions">
                <button class="primaryBtn" style="width:auto" type="button" id="createStickerBtn">Создать из фото</button>
              </div>
              <div class="stickerGrid" id="stickerGrid"></div>
              <p class="note" id="stickerNote"></p>
            </div>
          </div>
        </section>
      </main>

      <aside class="members" id="members" aria-label="Участники">
        <div class="memTop" id="membersTitle">Участники</div>
        <div class="memList" id="memberList"></div>
      </aside>
    </div>

    <div class="modal modal--hidden" id="settingsModal" role="dialog" aria-modal="true" aria-label="Настройки">
      <div class="modal__backdrop" id="settingsBackdrop"></div>
      <div class="settings">
        <aside class="settingsNav" aria-label="Разделы настроек">
          <div class="settingsNav__top">
            <div class="settingsNav__title" id="settingsTitle">Настройки</div>
            <input class="settingsNav__search" id="settingsSearch" placeholder="Поиск настроек" />
          </div>
          <div class="settingsNav__list" id="settingsNav"></div>
          <div class="settingsNav__bottom">
            <button class="dangerBtn dangerBtn--wide" id="settingsLogout" type="button">Выйти</button>
            <button class="ghostBtn ghostBtn--wide" id="settingsClose" type="button">Закрыть</button>
          </div>
        </aside>

        <section class="settingsBody" aria-label="Параметры">
          <header class="settingsBody__top">
            <div class="settingsBody__crumb" id="settingsCrumb">Мой аккаунт</div>
            <button class="iconBtn" id="settingsX" type="button" title="Закрыть">✕</button>
          </header>

          <div class="settingsBody__content" id="settingsContent"></div>
        </section>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script src="./db.js"></script>
    <script src="./voice.js"></script>
    <script src="./app_settings.js"></script>
    <script src="./app_main.js"></script>
    <script type="module">
  </body>
    
  
    
    
    
    
  
  
  
  
</html>
